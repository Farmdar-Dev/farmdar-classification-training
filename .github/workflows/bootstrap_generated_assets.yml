name: Bootstrap generated assets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate image dataset and trained model
        run: |
          python src/download_keyword_dataset.py --output-dir data/images --demo-dir data/demo_inputs --target-per-class 150 --clean
          python src/train_model.py

      - name: Commit generated classroom assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs/DATASET_SOURCES.md models reports
          if git diff --cached --quiet; then
            echo "No generated assets changed."
          else
            git commit -m "Generate classroom dataset and trained model"
            git push
          fi
